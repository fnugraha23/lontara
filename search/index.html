<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hasil Pencarian | Lontara</title>

    <link rel="icon" type="image/png" href="../assets/images/favicon.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/main.css" />

    <style>
      .search-header {
        background: var(--bg-main);
        padding: 80px 0 40px;
        text-align: center;
        border-bottom: 1px solid var(--border);
      }
      .search-query-text {
        color: var(--accent);
      }
      .results-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      .result-card {
        background: var(--bg-light);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 25px;
        transition: var(--transition);
        text-align: left;
      }
      .result-card:hover {
        border-color: var(--accent);
        box-shadow: var(--shadow-md);
        transform: translateY(-3px);
      }
      .result-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .badge {
        font-size: 0.75rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .badge-layanan {
        background: #e0f2fe;
        color: #0284c7;
      }
      .badge-portofolio {
        background: #f3e8ff;
        color: #9333ea;
      }
      .badge-artikel {
        background: #ffedd5;
        color: #ea580c;
      }
      .badge-aset {
        background: #dcfce7;
        color: #16a34a;
      }
      .result-title {
        font-size: 1.3rem;
        margin-bottom: 10px;
      }
      .result-title a {
        color: var(--primary);
      }
      .result-title a:hover {
        color: var(--accent);
      }
      .result-desc {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 0;
      }
      .no-results {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <header class="header" id="header">
      <div class="progress-bar" id="progress-bar"></div>
      <div class="container nav-container">
        <div class="logo">
          <a href="../beranda.html">
            <img
              src="../assets/images/logo.png"
              alt="Lontara Logo"
              width="120"
              height="38"
            />
          </a>
        </div>

        <nav class="nav" id="nav-menu">
          <div class="nav-item">
            <a href="../layanan/layanan.html">Layanan</a>
          </div>
          <div class="nav-item">
            <a href="../portofolio/portofolio.html">Portofolio</a>
          </div>
          <div class="nav-item">
            <a href="../artikel/artikel.html">Artikel</a>
          </div>
          <div class="nav-item">
            <a href="../publikasi/publikasi.html">Publikasi</a>
          </div>
          <div class="nav-item">
            <a href="../aset-digital/aset-digital.html">Aset Digital</a>
          </div>
          <div class="nav-item">
            <a href="../tentang/tentang.html">Tentang</a>
          </div>

          <div class="nav-search">
            <form id="search-form" action="" method="GET">
              <input
                type="text"
                name="q"
                placeholder="Cari..."
                class="search-input"
                required
              />
              <button type="submit" class="search-btn" aria-label="Cari">
                <svg
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  stroke="currentColor"
                  stroke-width="2"
                  fill="none"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </button>
            </form>
          </div>

          <a href="../kontak/kontak.html" class="nav-cta">Kontak</a>
        </nav>

        <button
          class="nav-toggle"
          id="nav-toggle"
          aria-label="Toggle navigation"
        >
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <main>
      <section class="search-header">
        <div class="container">
          <h1>Hasil Pencarian</h1>
          <p>
            Menampilkan hasil untuk:
            <strong class="search-query-text" id="query-display">...</strong>
          </p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="results-container" id="results-list">
            <div class="no-results">Memuat data pencarian...</div>
          </div>
        </div>
      </section>
    </main>

    <script src="../js/utils.js"></script>
    <script src="../js/animation.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/search.js"></script>
  </body>
</html>
